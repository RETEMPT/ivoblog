services:
  blog:
    build:
      context: ../ivoblog/blog
      dockerfile: Dockerfile
    container_name: iv0-blog
    restart: unless-stopped
    env_file:
      - ../ivoblog/blog/.env.production
    volumes:
      - blog_uploads:/app/public/uploads
      - ../ivoblog/blog/posts:/app/posts:ro
      - ../ivoblog/blog/chatters:/app/chatters:ro
      - ../ivoblog/blog/moments:/app/moments:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/test', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:alpine
    container_name: iv0-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      blog:
        condition: service_healthy
    networks:
      - app-network

volumes:
  blog_uploads:

networks:
  app-network:
    driver: bridge
